# =============================================================
# Terraform Security Pipeline
# =============================================================
# Enforces security, compliance, and quality checks on every
# PR and push to main. Each job runs in isolation — a failure
# in one does not suppress results from others.
#
# Job execution order:
#   terraform-checks (runs first)
#       ↓ (all three run in parallel after checks pass)
#   tfsec ── checkov ── gitleaks ── custom-scanner
# =============================================================

name: Terraform Security Pipeline

# Trigger on all PRs and direct pushes to main.
# PRs are the primary gate — main push is a safety net.
on:
  pull_request:
  push:
    branches:
      - main

jobs:

  # -----------------------------------------------------------
  # Job 1 — Terraform Format & Validate
  # -----------------------------------------------------------
  # Validates syntax and formatting before any security tooling
  # runs. Downstream jobs declare `needs: terraform-checks` so
  # they are skipped automatically if this job fails — no point
  # scanning malformed HCL.
  # -----------------------------------------------------------
  terraform-checks:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Pin the Terraform version to avoid silent breakage if
      # HashiCorp ships a new release with breaking changes.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # -backend=false skips remote state initialisation.
      # The runner has no AWS credentials — this keeps init
      # fast and credential-free while still downloading
      # providers needed for validate to work correctly.
      - name: Terraform Init
        run: terraform init -backend=false

      # -check exits non-zero without modifying files.
      # -recursive covers root and all module subdirectories.
      # Developers should run `terraform fmt` locally before pushing.
      - name: Check formatting
        run: terraform fmt -check -recursive

      # Static analysis only — no AWS calls made.
      # Catches type mismatches, missing required arguments,
      # and undefined variable references across all modules.
      - name: Validate syntax
        run: terraform validate

  # -----------------------------------------------------------
  # Job 2 — tfsec
  # -----------------------------------------------------------
  # Static analysis tool purpose-built for Terraform. Checks
  # HCL directly without requiring a plan or AWS credentials.
  # Runs in parallel with checkov and gitleaks after Job 1 passes.
  #
  # `needs: terraform-checks` ensures we only scan syntactically
  # valid code — malformed HCL produces noisy false positives.
  # -----------------------------------------------------------
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    needs: terraform-checks  # only runs if Job 1 passes

    steps:
      - uses: actions/checkout@v4

      # Official tfsec GitHub Action.
      # soft_fail: false means any finding exits non-zero,
      # which fails the pipeline and blocks the PR.
      # Set soft_fail: true temporarily if you're clearing a
      # backlog of existing findings without blocking the team.
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: false
  # -----------------------------------------------------------
  # Job 3 — Checkov
  # -----------------------------------------------------------
  # Policy-as-code scanner with a larger rule library than tfsec.
  # Maps findings to compliance frameworks (CIS, SOC2, PCI-DSS)
  # which is useful for audit and compliance reporting.
  #
  # Running both tfsec and Checkov is intentional — they use
  # different rule sets and each catches issues the other misses.
  # Defense in depth applies to tooling, not just infrastructure.
  # -----------------------------------------------------------
  checkov:
    name: Checkov Policy Scan
    runs-on: ubuntu-latest
    needs: terraform-checks  # only runs if Job 1 passes

    steps:
      - uses: actions/checkout@v4

      # soft_fail: false blocks the PR on any finding.
      # No skip_check — all rules are enforced.
      # output_format: cli gives human-readable output in the
      # Actions log so you can see exactly what failed and why.
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false
          output_format: cli